<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacific Connect | Private Social Network</title>
    <style>
        :root { --primary: #ff4b2b; --secondary: #ff416c; --bg: #0f0f0f; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .container { max-width: 400px; width: 90%; background: #1a1a1a; padding: 40px 20px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 28px; margin-bottom: 10px; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #aaa; font-size: 16px; line-height: 1.5; margin-bottom: 30px; }
        .live-status { background: rgba(35, 134, 54, 0.2); color: #3fb950; padding: 5px 15px; border-radius: 20px; font-size: 12px; display: inline-block; margin-bottom: 20px; border: 1px solid #238636; }
        .cta-btn { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; text-decoration: none; padding: 18px 0; width: 100%; display: block; border-radius: 50px; font-weight: bold; font-size: 18px; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4); }
        .cta-btn:hover { transform: scale(1.03); opacity: 0.9; }
        .footer-text { margin-top: 30px; font-size: 11px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <div class="live-status">● 1,402 Members Active in Fiji</div>
        <h1>Pacific Connect</h1>
        <p>Join the most exclusive private social network in the islands. Secure, anonymous, and local.</p>
        
        <a href="https://yourusername.github.io" class="cta-btn">ENTER PRIVATE PORTAL</a>

        <div class="footer-text">
            Must be 18+ to enter. By clicking, you agree to our Community Terms. <br>
            © 2026 Pacific Connect Group.
        </div>
    </div>
</body>
</html>
